——自动匹配与异常标记", "filename": "【AI系列·第31篇】AI做银行对账——自动匹配与异常标记.md", "summary": "# 【AI系列·第31篇】AI做对账——从银行流水到业务订单的自动匹配  文 / Parson资金研习社  ---  上一篇讲了AI做现金流预测。这一篇讲另一个资金人的日常痛点：**对账。**  对账有两种： - **银行对账**：把银行流水和内部账务一笔笔核对，找出差异，查明原因。10个银行账户、上千笔交易，手动对一遍要两三天。 - **业务对账**：把业务订单表和财务回款表逐笔核对，找出未回款..."}, {"episode": 32, "title": "AI做Excel批量处理——从数十个子公司报表中提取、汇总、校验", "filename": "【AI系列·第32篇】AI做Excel批量处理——从数十个子公司报表中提取、汇总、校验.md", "summary": "# 【AI系列·第32篇】AI做Excel批量处理——从数十个子公司报表中提取、汇总、校验  文 / Parson资金研习社  ---  上一篇讲了AI做银行对账。这一篇讲另一个资金人的日常痛点：**Excel批量处理。**  集团企业通常有几十家子公司，每家子公司每月要报送资金报表——余额表、收支表、授信使用表。这些报表格式不统一、数据质量参差不齐，汇总一次要花好几天。  **AI能做什么？**..."}, {"episode": 33, "title": "AI做PPT和视频——有数据就能做汇报材料", "filename": "【AI系列·第33篇】AI做PPT和视频——有数据就能做汇报材料.md", "summary": "# 【AI系列·第33篇】AI做PPT和视频——有数据就能做汇报材料  文 / Parson资金研习社  ---  上一篇讲了AI做Excel批量处理。这一篇讲另一个资金人的痛点：**做PPT和视频。**  每个月的资金分析会、每季度的经营分析会、每年的董事会——都需要做汇报材料。资金人最头疼的不是\"数据对不对\"，而是\"PPT好不好看\"。  **AI能做什么？** 有数据就能做PPT、做汇报视频。..."}, {"episode": 34, "title": "AI做外汇策略——汇率分析与锁汇建议", "filename": "【AI系列·第34篇】AI做外汇策略——汇率分析与锁汇建议.md", "summary": "# 【AI系列·第34篇】AI做外汇策略——汇率分析与锁汇建议  文 / Parson资金研习社  ---  上一篇讲了AI做PPT和视频。这一篇进入第八阶段的第二部分——AI+金融市场与投资。  先讲资金人最关心的金融市场问题：**外汇。**  有跨境业务的企业，外汇风险是实实在在的——汇率波动直接影响利润。人民币对美元升值1%，一笔1000万美元的应收账款就少了100万人民币。  **AI能做..."}, {"episode": 35, "title": "AI做理财分析——银行理财产品对比与收益测算", "filename": "【AI系列·第35篇】AI做理财分析——银行理财产品对比与收益测算.md", "summary": "# 【AI系列·第35篇】AI做理财分析——银行理财产品对比与收益测算  文 / Parson资金研习社  ---  上一篇讲了AI做外汇策略。这一篇继续讲AI+金融市场与投资——**理财分析。**  企业账上总有闲置资金——可能是暂时不用的运营资金，可能是等待投资的专项资金。这些钱不能趴在活期账户上吃0.2%的利息，需要做短期理财。  但银行理财产品一堆——结构性存款、货币基金、大额存单、逆回购..."}, {"episode": 36, "title": "AI做投资组合管理——资产配置与到期提醒", "filename": "【AI系列·第36篇】AI做投资组合管理——资产配置与到期提醒.md", "summary": "# 【AI系列·第36篇】AI做投资组合管理——资产配置与到期提醒  文 / Parson资金研习社  ---  上一篇讲了AI做理财分析——银行理财产品对比与收益测算。这一篇继续讲AI+金融市场与投资——**投资组合管理。**  企业闲置资金的理财，不是\"买一个产品就完事\"，而是\"管理一个组合\"。组合里有不同期限、不同风险、不同收益的产品，需要动态调整、到期提醒、再投资决策。  **AI能做什么..."}, {"episode": 37, "title": "AI做流动性管理——实时监控与调度建议", "filename": "【AI系列·第37篇】AI做流动性管理——实时监控与调度建议.md", "summary": "# 【AI系列·第37篇】AI做流动性管理——实时监控与调度建议  文 / Parson资金研习社  ---  上一篇讲了AI做投资组合管理。这一篇继续讲AI+金融市场与投资——**流动性管理。**  流动性是资金管理的\"生命线\"——企业必须保证有足够的现金应对日常运营、到期债务、突发需求。但流动性管理也是最难的——钱多了收益低，钱少了风险高，需要在收益和风险之间找平衡。  **AI能做什么？**..."}, {"episode": 38, "title": "AI管理银行邮件——自动分类与摘要", "filename": "【AI系列·第38篇】AI管理银行邮件——自动分类与摘要.md", "summary": "# 【AI系列·第38篇】AI管理银行邮件——自动分类与摘要  文 / Parson资金研习社  ---  上一篇讲了AI做流动性管理。这一篇进入第八阶段的第三部分——AI+银行关系与邮件管理。  先讲资金人的日常痛点：**银行邮件。**  资金人每天要处理大量银行邮件——报价单、回单、通知、对账单、产品推荐……一个邮箱里几百封邮件，找某封特定邮件像大海捞针。  **AI能做什么？** 自动分类邮..."}, {"episode": 39, "title": "AI做授信续期管理——到期提醒与材料打包", "filename": "【AI系列·第39篇】AI做授信续期管理——到期提醒与材料打包.md", "summary": "# 【AI系列·第39篇】AI做授信续期管理——到期提醒与材料打包  文 / Parson资金研习社  ---  上一篇讲了AI管理银行邮件。这一篇继续讲AI+银行关系与邮件管理——**授信续期管理。**  授信是企业的\"资金生命线\"——银行给你额度，你才能贷款、开信用证、开保函。但授信有期限，到期前必须续期，否则额度失效，影响业务。  **AI能做什么？** 自动跟踪授信到期日、提醒续期、打包续..."}, {"episode": 40, "title": "AI做银行会谈准备——谈参生成与关系管理", "filename": "【AI系列·第40篇】AI做银行会谈准备——谈参生成与关系管理.md", "summary": "# 【AI系列·第40篇】AI做银行会谈准备——谈参生成与关系管理  文 / Parson资金研习社  ---  上一篇讲了AI做授信续期管理。这一篇继续讲AI+银行关系与邮件管理——**银行会谈准备。**  资金人经常要和银行开会——授信评审会、业务沟通会、年度回顾会。每次开会前都要准备谈参——企业介绍、业务数据、合作历史、未来计划。准备一次谈参要花大半天。  **AI能做什么？** 自动分析历..."}, {"episode": 41, "title": "AI做客户信用风险评估——基于公开数据的信用评分与风险预警", "filename": "【AI系列·第41篇】AI做客户信用风险评估——基于公开数据的信用评分与风险预警.md", "summary": "# 【AI系列·第41篇】AI做客户信用风险评估——基于公开数据的信用评分与风险预警  文 / Parson资金研习社  ---  上一篇讲了AI做银行会谈准备。这一篇进入新阶段——**AI+风控与合规**，先讲客户信用风险评估。  做资金的人都知道，客户欠款不可怕，可怕的是你不知道他什么时候会还不上。传统做法是靠经验判断，或者等财务报表出来再看——但等你发现问题的时候，钱已经收不回来了。  **..."}, {"episode": 42, "title": "AI做供应商评估——信用分析与动态监控", "filename": "【AI系列·第42篇】AI做供应商评估——信用分析与动态监控.md", "summary": "# 【AI系列·第42篇】AI做供应商评估——信用分析与动态监控  文 / Parson资金研习社  ---  上一篇讲了AI做客户信用风险评估。这一篇继续讲AI+风控与合规——**供应商评估。**  资金人管的不只是\"钱出去\"，还要管\"钱出去之后，供应商靠不靠谱\"。供应商出问题，轻则交货延迟、质量不达标，重则资金链断裂、合同违约。传统做法是靠采购部门的经验判断，或者等出了问题再追责——但等你发现..."}, {"episode": 43, "title": "AI做银行准入评估——资质对比与服务评价", "filename": "【AI系列·第43篇】AI做银行准入评估——资质对比与服务评价.md", "summary": "# 【AI系列·第43篇】AI做银行准入评估——资质对比与服务评价  文 / Parson资金研习社  ---  上一篇讲了AI做供应商评估。这一篇继续讲AI+风控与合规——**银行准入评估。**  资金人和银行打交道，不只是\"谁给的利率低就选谁\"。银行的资质、服务、风控能力、合作稳定性，都会影响资金安全和业务效率。选错银行，轻则服务跟不上、审批慢，重则抽贷、断贷，影响企业经营。  **AI能做什..."}, {"episode": 44, "title": "AI做合规审查——跨境资金合规与反洗钱筛查", "filename": "【AI系列·第44篇】AI做合规审查——跨境资金合规与反洗钱筛查.md", "summary": "# 【AI系列·第44篇】AI做合规审查——跨境资金合规与反洗钱筛查  文 / Parson资金研习社  ---  上一篇讲了AI做银行准入评估。这一篇继续讲AI+风控与合规——**合规审查。**  资金人管钱，最怕的不是亏钱，而是\"犯法\"。跨境资金合规、反洗钱筛查、制裁名单比对——这些听起来离日常操作很远，但一旦出问题，轻则罚款，重则刑事责任。  **AI能做什么？** 自动筛查交易对手、比对制..."}, {"episode": 45, "title": "AI做外汇风险监控——实时汇率监控与对冲建议", "filename": "【AI系列·第45篇】AI做外汇风险监控——实时汇率监控与对冲建议.md", "summary": "# 【AI系列·第45篇】AI做外汇风险监控——实时汇率监控与对冲建议  文 / Parson资金研习社  ---  上一篇讲了AI做合规审查。这一篇继续讲AI+风控与合规——**外汇风险监控。**  做跨境业务的资金人，最怕汇率波动。今天签的合同，三个月后收款时汇率变了，利润可能就没了。传统做法是靠经验判断，或者等财务报表出来再看——但等你发现问题的时候，汇兑损失已经发生了。  **AI能做什么..."}, {"episode": 46, "title": "AI+飞书企微自动化——通过MCP连接企业IM", "filename": "【AI系列·第46篇】AI+飞书企微自动化——通过MCP连接企业IM.md", "summary": "# 【AI系列·第46篇】AI+飞书企微自动化——通过MCP连接企业IM  文 / Parson资金研习社  ---  上一篇讲了AI做外汇风险监控。这一篇进入新阶段——**AI工作流与自动化**，先讲AI+飞书/企微自动化。  资金人每天要处理大量信息——日报、预警、审批、通知。手动推送这些信息，既耗时又容易遗漏。传统做法是靠人工发送，或者用简单的定时任务——但信息格式单一，无法根据内容动态调整..."}, {"episode": 47, "title": "AI+RPA协同——AI做决策、RPA做执行", "filename": "【AI系列·第47篇】AI+RPA协同——AI做决策、RPA做执行.md", "summary": "# 【AI系列·第47篇】AI+RPA协同——AI做决策、RPA做执行  文 / Parson资金研习社  ---  上一篇讲了AI+飞书/企微自动化。这一篇继续讲AI工作流与自动化——**AI+RPA协同。**  资金人的日常操作有很多重复性工作——网银付款、银行对账、报表生成、数据录入。这些工作规则明确、流程固定，非常适合自动化。但传统RPA只能执行固定流程，遇到异常就卡住。  **AI能做什..."}, {"episode": 48, "title": "AI+ExcelPython自动化——批量处理财务数据", "filename": "【AI系列·第48篇】AI+ExcelPython自动化——批量处理财务数据.md", "summary": "# 【AI系列·第48篇】AI+Excel/Python自动化——批量处理财务数据  文 / Parson资金研习社  ---  上一篇讲了AI+RPA协同。这一篇继续讲AI工作流与自动化——**AI+Excel/Python自动化。**  资金人的日常工作中，Excel是使用频率最高的工具。但Excel有局限——数据量大了卡顿、复杂计算容易出错、重复操作耗时。Python可以解决这些问题，但资金..."}, {"episode": 49, "title": "AI+数据库直连——通过MCP连接内部数据库", "filename": "【AI系列·第49篇】AI+数据库直连——通过MCP连接内部数据库.md", "summary": "# 【AI系列·第49篇】AI+数据库直连——通过MCP连接内部数据库  文 / Parson资金研习社  ---  上一篇讲了AI+Excel/Python自动化。这一篇继续讲AI工作流与自动化——**AI+数据库直连。** function filterArticles() {
  const query = document.getElementById('search').value.toLowerCase();
  let filtered = articles;
  
  if (query) {
    filtered = articles.filter(a => 
      a.title.toLowerCase().includes(query) || 
      a.summary.toLowerCase().includes(query)
    );
  }
  
  renderArticles(filtered);
}

function renderArticles(list) {
  const container = document.getElementById('results');
  if (list.length === 0) {
    container.innerHTML = '<div class="empty">没有找到匹配的文章</div>';
    return;
  }
  
  let html = '<div style="font-size:14px;color:#888;margin-bottom:16px">共 ' + list.length + ' 篇文章</div>';
  
  list.forEach(a => {
    html += '<div class="article-card" style="background:#fff;border-radius:12px;padding:24px;margin-bottom:16px;border:1px solid #e0e0e8;box-shadow:0 2px 8px rgba(0,0,0,0.04)">';
    html += '<div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">';
    html += '<span style="background:#4a90a4;color:#fff;padding:4px 12px;border-radius:16px;font-size:12px;font-weight:600">第' + a.episode + '篇</span>';
    html += '<span style="font-size:18px;font-weight:600;color:#1a1a1a">' + a.title + '</span>';
    html += '</div>';
    html += '<div style="font-size:14px;color:#666;line-height:1.6">' + a.summary + '</div>';
    html += '<a href="https://github.com/ParsonTSG888/Treasury-AI/blob/main/' + encodeURIComponent(a.filename) + '" target="_blank" style="display:inline-block;margin-top:12px;color:#4a90a4;text-decoration:none;font-size:14px;font-weight:500">查看原文 →</a>';
    html += '</div>';
  });
  
  container.innerHTML = html;
}

// 初始渲染
renderArticles(articles);
